name: clang-format

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 22
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gpg
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/llvm-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22

      - name: Check formatting
        env:
          CLANG_FORMAT: clang-format-22
        run: |
          which "$CLANG_FORMAT"
          "$CLANG_FORMAT" --version
          bash ./check-format.sh
