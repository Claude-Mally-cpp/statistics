name: clang-format

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.clang
          load: true
          tags: cpp-ci-clang:latest
          cache-from: type=gha,scope=dockerfile-clang
          cache-to: type=gha,mode=max,scope=dockerfile-clang

      - name: Check formatting
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash -lc "clang-format-22 --version && CLANG_FORMAT=clang-format-22 bash ./format-check.sh"
