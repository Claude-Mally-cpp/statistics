name: doxygen

on:
  pull_request:
  workflow_dispatch:

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.clang
          load: true
          tags: cpp-ci-clang:latest
          cache-from: type=gha,scope=dockerfile-clang
          cache-to: type=gha,mode=max,scope=dockerfile-clang

      - name: Verify Doxygen docs
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash ./doxygen-docs.sh --verify

      - name: Generate Doxygen docs artifact
        if: github.event_name == 'workflow_dispatch'
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash ./doxygen-docs.sh

      - name: Upload Doxygen HTML artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: out/docs/doxygen/html
          if-no-files-found: error
