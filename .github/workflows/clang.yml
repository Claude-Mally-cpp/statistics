name: clang

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [debug, release]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.clang
          load: true
          tags: cpp-ci-clang:latest
          cache-from: type=gha,scope=dockerfile-clang
          cache-to: type=gha,mode=max,scope=dockerfile-clang

      - name: Configure & Build (${{ matrix.config }})
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash -lc "cmake --preset linux-clang-${{ matrix.config }} &&
                    cmake --build out/build/linux-clang-${{ matrix.config }}"

      - name: Run tests (${{ matrix.config }})
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          ./out/build/linux-clang-${{ matrix.config }}/statistics_test

      - name: Install CLI package (${{ matrix.config }})
        if: matrix.config == 'release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash -lc "cmake --install out/build/linux-clang-${{ matrix.config }} --prefix out/package/linux-clang-${{ matrix.config }}"

      - name: Archive CLI package (${{ matrix.config }})
        if: matrix.config == 'release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        run: |
          rm -rf out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}
          mkdir -p out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}
          cp -R out/package/linux-clang-${{ matrix.config }}/. out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}/
          cp README.md LICENSE out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}/
          tar -czf out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}.tar.gz -C out/artifacts statistics-cli-linux-clang-${{ matrix.config }}

      - name: Upload CLI artifact (${{ matrix.config }})
        if: matrix.config == 'release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: statistics-cli-linux-clang-${{ matrix.config }}
          path: out/artifacts/statistics-cli-linux-clang-${{ matrix.config }}.tar.gz
          if-no-files-found: error
