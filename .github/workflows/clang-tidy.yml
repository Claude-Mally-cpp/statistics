name: clang-tidy

on:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.clang
          load: true
          tags: cpp-ci-clang:latest
          cache-from: type=gha,scope=dockerfile-clang
          cache-to: type=gha,mode=max,scope=dockerfile-clang

      - name: Prepare compile_commands.json
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          cpp-ci-clang
          bash -lc "clang-22 --version &&
                    clang++-22 --version &&
                    clang-tidy-22 --version &&
                    bash ./tidy-prepare.sh"

      - name: Run clang-tidy
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/project
          -w /project
          -e CLANG_TIDY_BIN=clang-tidy-22
          cpp-ci-clang
          bash ./tidy-run-checks.sh
