name: clang-tidy

on:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: out/build/linux-clang-release/_deps
          key: ${{ runner.os }}-cmake-deps-linux-clang-release-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-deps-linux-clang-release-

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gpg
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/llvm-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-22 \
            clang-tidy-22 \
            libc++-22-dev \
            libc++abi-22-dev

      - name: Prepare compile_commands.json
        env:
          CC: clang-22
          CXX: clang++-22
        run: |
          clang-22 --version
          clang++-22 --version
          clang-tidy-22 --version
          bash ./clang-tidy-prepare.sh

      - name: Run clang-tidy
        env:
          CLANG_TIDY_BIN: clang-tidy-22
        run: bash ./clang-tidy-run-checks.sh
