name: msvc

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Debug
            preset: msvc-x64-debug
          - config: Release
            preset: msvc-x64-release

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: out/build/${{ matrix.preset }}/_deps
          key: ${{ runner.os }}-cmake-deps-${{ matrix.preset }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-deps-${{ matrix.preset }}-

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (${{ matrix.config }})
        shell: pwsh
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.config }})
        shell: pwsh
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.config }})
        shell: pwsh
        run: ctest --preset ${{ matrix.preset }}

      - name: Install CLI package (${{ matrix.config }})
        if: matrix.config == 'Release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        shell: pwsh
        run: cmake --install out/build/${{ matrix.preset }} --config ${{ matrix.config }} --prefix out/package/${{ matrix.preset }}

      - name: Archive CLI package (${{ matrix.config }})
        if: matrix.config == 'Release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          $stageDir = "out/artifacts/cli-package-${{ matrix.preset }}"
          $zipPath = "$stageDir.zip"
          Remove-Item -LiteralPath $stageDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "out/artifacts" -Force | Out-Null
          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item -Path "out/package/${{ matrix.preset }}/*" -Destination $stageDir -Recurse
          Copy-Item -Path README.md, LICENSE -Destination $stageDir
          Compress-Archive -Path $stageDir -DestinationPath $zipPath

      - name: Upload CLI artifact (${{ matrix.config }})
        if: matrix.config == 'Release' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: cli-package-${{ matrix.preset }}
          path: out/artifacts/cli-package-${{ matrix.preset }}.zip
          if-no-files-found: error
